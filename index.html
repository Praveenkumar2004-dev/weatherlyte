<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#38bdf8">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QJEFJKSJL5"></script>

<title>Weatherlyte</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1163/1163661.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
#bgLayer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    z-index: -2;
}
html {
    height: 100%;
}

body {
    margin: 0;
    padding: 0;
    position: relative;
    min-height: 100vh;
}

body {
    font-family:Segoe UI;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    color:white;
    display:flex;
    min-height:100vh;
    transition: background-image 0.8s ease-in-out, opacity 0.4s ease;
}

.fade-out{ opacity:0.6; }

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
    pointer-events:none;
}

#city{ font-size:42px; font-weight:bold; }
#icon{ font-size:60px; }

.rain{position:fixed;width:100%;height:100%;pointer-events:none;}
#cloudContainer,#snowContainer,#flash{pointer-events:none;}

.drop{position:absolute;width:2px;height:15px;background:white;animation:fall linear infinite;}
@keyframes fall{to{transform:translateY(100vh);}}

.cloud{position:fixed;font-size:40px;animation:move linear infinite;}
@keyframes move{from{transform:translateX(-300px);}to{transform:translateX(110vw);}}

.snowflake{position:fixed;font-size:12px;animation:snowFall linear infinite;}
@keyframes snowFall{to{transform:translateY(100vh);}}

.flash{position:fixed;width:100%;height:100%;background:white;opacity:0;}

.glass{background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);border-radius:20px;}

.sidebar{width:70px;height:100vh;display:flex;flex-direction:column;align-items:center;padding-top:20px;}
.sidebar button{background:none;border:none;color:white;font-size:26px;margin:20px 0;cursor:pointer;}

.container{display:flex;flex:1;}
.center{flex:2;text-align:center;padding:40px;}
.right{width:350px;padding:25px;}

.temp{font-size:70px;}
.fahrenheit{font-size:18px;}

.card{padding:18px;margin-bottom:18px;font-size:18px;}

.search input{padding:12px;border-radius:20px;border:none;width:250px;}
.search button{padding:12px 16px;border-radius:20px;border:none;background:#38bdf8;color:white;cursor:pointer;}

.chart-box{background:rgba(0,0,0,0.7);padding:20px;border-radius:20px;}

#chatbotBox{position:fixed;bottom:20px;right:20px;width:300px;background:rgba(0,0,0,0.85);border-radius:15px;padding:12px;}
#chatOptions button{width:100%;margin:5px 0;padding:8px;border:none;border-radius:10px;background:#38bdf8;color:white;}
#chatbotBox.hide{display:none;}
</style>
</head>

<body>
<div id="bgLayer"></div>

<div class="overlay"></div>

<div id="rainContainer" class="rain"></div>
<div id="cloudContainer"></div>
<div id="snowContainer"></div>
<div id="flash" class="flash"></div>

<div class="sidebar glass">
<button onclick="loadWeather('Chennai')">🏠</button>
<button onclick="showDashboard()">📊</button>
</div>

<div class="container">

<div class="center" id="mainView">

<h1 style="margin-bottom:5px;">🌦️ Weatherlyte</h1>
<p style="opacity:0.8;margin-top:0;">Real-time weather with smart insights</p>

<div class="search">
<input id="cityInput" placeholder="Search city">
<button onclick="searchCity()">Search</button>
</div>

<h2 id="city"></h2>
<div id="icon">☀️</div>

<div class="temp">
<span id="celsius"></span>
<span class="fahrenheit" id="fahrenheit"></span>
</div>

<p id="desc"></p>

</div>

<div class="right glass" id="rightPanel">
<div class="card" id="humidity"></div>
<div class="card" id="wind"></div>
<div class="card" id="feels"></div>
<div class="card" id="pressure"></div>
</div>

<div id="dashboardView" style="display:none;flex:1;padding:40px;">
<button onclick="showMain()">⬅ Back</button>
<div class="chart-box">
<canvas id="tempChart"></canvas>
</div>
</div>

</div>

<div id="chatbotBox">
<div style="font-weight:bold;margin-bottom:10px;">🤖 Weather Assistant</div>
<div id="chatOptions"></div>
<div id="chatResponse"></div>
</div>

<script>

let chart, clockInterval, lightningInterval, currentOffset=0;
let baseDescription="", lastWeather={};

function getCityTime(offset){
let utc = Date.now() + new Date().getTimezoneOffset()*60000;
let city = new Date(utc + offset*1000);

let h = city.getHours();
let m = String(city.getMinutes()).padStart(2,'0');
let s = String(city.getSeconds()).padStart(2,'0');

let ampm = h>=12?"PM":"AM";
h = h%12 || 12;

return `${h}:${m}:${s} ${ampm}`;
}

function startClock(){
clearInterval(clockInterval);
clockInterval = setInterval(()=>{
let time = getCityTime(currentOffset);
document.getElementById("desc").innerHTML =
baseDescription + "<br>🕒 " + time;
},1000);
}

function clearEffects(){
rainContainer.innerHTML="";
cloudContainer.innerHTML="";
snowContainer.innerHTML="";
clearInterval(lightningInterval);
}

function startRain(){for(let i=0;i<100;i++){let d=document.createElement("div");d.className="drop";d.style.left=Math.random()*100+"vw";d.style.animationDuration=(Math.random()+0.5)+"s";rainContainer.appendChild(d);}}
function startClouds(){for(let i=0;i<10;i++){let c=document.createElement("div");c.className="cloud";c.innerHTML="☁️";c.style.top=Math.random()*60+"vh";c.style.animationDuration=(15+Math.random()*10)+"s";cloudContainer.appendChild(c);}}
function startSnow(){for(let i=0;i<50;i++){let s=document.createElement("div");s.className="snowflake";s.innerHTML="❄";s.style.left=Math.random()*100+"vw";snowContainer.appendChild(s);}}
function startLightning(){lightningInterval=setInterval(()=>{flash.style.opacity=0.8;setTimeout(()=>flash.style.opacity=0,100);},4000);}

/* ✅ UPDATED ONLY THIS FUNCTION */
function applyWeather(condition,temp){

clearEffects();
let c = condition.toLowerCase();

/* 🌧 Rain */
if(c.includes("rain") || c.includes("drizzle") || c.includes("thunder")){
startRain(); startLightning();
return "🌧";
}

/* ☁ Clouds */
if(c.includes("cloud") || c.includes("haze") || c.includes("mist")){
startClouds();

/* hot cloudy → better icon */
if(temp > 30) return "⛅";

return "☁️";
}

/* ❄ Cold / snow */
if(c.includes("snow") || temp < 12){
startSnow();
return "❄️";
}

/* 🌙 Night */
let hour = new Date().getHours();
if(hour >= 18 || hour < 6){
return "🌙";
}

/* ☀ Clear */
return "☀️";
}

function setBackground(city, condition){

// 🔥 FORCE CLEAN CITY NAME (bulletproof)
let key = city.toLowerCase()
    .split(",")[0]
    .trim()
    .replace(/\s+/g,'');

let path = `https://praveenkumar2004-dev.github.io/weatherlyte/images/${key}.jpg`;

console.log("CITY:", city);
console.log("KEY:", key);
console.log("PATH:", path);

let img = new Image();
document.body.classList.add("fade-out");

img.onload = () => {
    document.getElementById("bgLayer").style.backgroundImage = `url(${path})`;
    setTimeout(()=>document.body.classList.remove("fade-out"),200);
};

img.onerror = () => {
    console.log("IMAGE FAILED:", path);

    let cond = condition.toLowerCase();

    let fallback =
    cond.includes("rain") ? "https://images.unsplash.com/photo-1501594907352-04cda38ebc29" :
    cond.includes("cloud") ? "https://images.unsplash.com/photo-1499346030926-9a72daac6c63" :
    "https://images.unsplash.com/photo-1501973801540-537f08ccae7b";

    document.body.style.backgroundImage = `url(${fallback})`;
    setTimeout(()=>document.body.classList.remove("fade-out"),200);
};

img.src = path;
}

function loadWeather(city){
fetch("https://weather-backend-lbad.onrender.com/weather/"+city)
.then(r=>r.json())
.then(data=>{

if(data.error){alert("City not found");return;}

lastWeather=data;
currentOffset=data.timezone;

let c=Number(data.temperature);
let f=(c*9/5)+32;

document.getElementById("city").innerText=data.city;
document.getElementById("icon").innerText=applyWeather(data.condition,c);

setBackground(data.city,data.condition);

document.getElementById("celsius").innerHTML=
c+"°C <span style='font-size:18px'>(Feels "+data.feels_like+"°C)</span>";

document.getElementById("fahrenheit").innerText=" "+f.toFixed(1)+"°F";

baseDescription=data.description;

document.getElementById("humidity").innerText="💧 Humidity: "+data.humidity+"%";
document.getElementById("wind").innerText="🌬 Wind Speed: "+data.wind_speed+" m/s";
document.getElementById("feels").innerText="🌡 Feels Like: "+data.feels_like+"°C";
document.getElementById("pressure").innerText="📊 Pressure: "+data.pressure+" hPa";

startClock();
loadChart(data.city);
showOptions();
});
}

function loadChart(city){
fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=6d54e53b2897876e6bd9be07679796ef&units=metric`)
.then(r=>r.json())
.then(d=>{
if(!d.list) return;

let temps=[],labels=[],offset=d.city.timezone;

for(let i=0;i<8;i++){
let t=d.list[i].dt*1000;
let ct=new Date(t+offset*1000);
let h=ct.getUTCHours();
let ampm=h>=12?"PM":"AM";
h=h%12||12;

labels.push(h+" "+ampm);
temps.push(d.list[i].main.temp);
}

if(chart) chart.destroy();

chart=new Chart(tempChart,{
type:"line",
data:{labels,datasets:[{
label:"Next 24 Hours Temperature (°C)",
data:temps,
borderColor:"#38bdf8",
backgroundColor:"rgba(56,189,248,0.2)",
tension:0.4
}]}
});
});
}

function searchCity(){
let c=document.getElementById("cityInput").value.trim();
if(c) loadWeather(c);
}

function showDashboard(){
document.getElementById("mainView").style.display="none";
document.getElementById("rightPanel").style.display="none";
document.getElementById("dashboardView").style.display="block";
document.getElementById("chatbotBox").classList.add("hide");
}

function showMain(){
document.getElementById("mainView").style.display="block";
document.getElementById("rightPanel").style.display="block";
document.getElementById("dashboardView").style.display="none";
document.getElementById("chatbotBox").classList.remove("hide");
}

function showOptions(){
chatOptions.innerHTML=`
<button onclick="chatAnswer('temp')">🌡 Temperature</button>
<button onclick="chatAnswer('rain')">🌧 Rain?</button>
<button onclick="chatAnswer('weather')">🌤 Weather</button>
<button onclick="chatAnswer('humidity')">💧 Humidity</button>
`;
}

function chatAnswer(t){
if(!lastWeather.city){chatResponse.innerText="Search first";return;}
if(t=="temp")chatResponse.innerText=lastWeather.temperature+"°C";
if(t=="rain")chatResponse.innerText=lastWeather.condition.includes("rain")?"Yes":"No";
if(t=="weather")chatResponse.innerText=lastWeather.description;
if(t=="humidity")chatResponse.innerText=lastWeather.humidity+"%";
}

loadWeather("Chennai");

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

</script>
</body>
</html>
