<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:#000;
    overflow:hidden;
}

/* BACKGROUND */
#bg{
    position:fixed;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    filter:brightness(0.5);
    z-index:-1;
    transition:1s;
}

/* SEARCH */
.searchBox{
    text-align:center;
    margin-top:20px;
}
.searchBox input{
    padding:12px;
    width:280px;
    border-radius:25px;
    border:none;
}
.searchBox button{
    padding:12px 20px;
    border:none;
    border-radius:25px;
    background:#2bbcff;
    color:white;
}

/* MAIN */
.main{
    text-align:center;
    margin-top:80px;
}
#cityName{font-size:50px;}
#temp{font-size:70px;}

/* PANEL */
.panel{
    position:fixed;
    right:20px;
    top:120px;
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:20px;
    width:260px;
}
.panel div{margin:10px 0;}

/* TREND */
#trend{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    height:200px;
    background:rgba(0,0,0,0.5);
    border-radius:20px;
}

/* CHATBOT */
.chatbot{
    position:fixed;
    bottom:20px;
    right:20px;
    background:black;
    padding:15px;
    border-radius:15px;
}
.chatbot button{
    display:block;
    margin:5px 0;
    width:200px;
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="searchBox">
    <input id="cityInput" value="chennai">
    <button onclick="search()">Search</button>
</div>

<div class="main">
    <h1 id="cityName">--</h1>
    <div id="temp">--°C</div>
    <div id="condition"></div>
</div>

<div class="panel">
    <div id="humidity">Humidity:</div>
    <div id="wind">Wind:</div>
    <div id="feels">Feels:</div>
    <div id="pressure">Pressure:</div>
</div>

<div id="trend"></div>

<div class="chatbot">
    <b>Weather Assistant</b>
    <button onclick="showTemp()">🌡 Temperature</button>
    <button onclick="showWeather()">☁ Weather</button>
    <button onclick="showHumidity()">💧 Humidity</button>
</div>

<script>

let weatherData = {};

/* SEARCH */
function search(){
    let city = document.getElementById("cityInput").value;
    loadWeather(city);
}

/* LOAD WEATHER */
function loadWeather(city){

fetch("https://weather-backend-lbad.onrender.com/weather/" + city)
.then(r=>r.json())
.then(data=>{

    if(data.error){
        alert("City not found");
        return;
    }

    weatherData = data;

    /* UPDATE UI */
    document.getElementById("cityName").innerText = data.city;
    document.getElementById("temp").innerText = data.temperature.toFixed(1) + "°C";
    document.getElementById("condition").innerText = data.description;

    document.getElementById("humidity").innerText = "Humidity: " + data.humidity + "%";
    document.getElementById("wind").innerText = "Wind: " + data.wind_speed + " m/s";
    document.getElementById("feels").innerText = "Feels: " + data.feels_like + "°C";
    document.getElementById("pressure").innerText = "Pressure: " + data.pressure + " hPa";

    /* BACKGROUND */
    setBackground(data.city);

    /* TREND */
    drawTrend(data.temperature);

});
}

/* BACKGROUND */
function setBackground(city){
    document.getElementById("bg").style.backgroundImage =
    `url('https://source.unsplash.com/1600x900/?${city}')`;
}

/* TREND GRAPH */
function drawTrend(temp){

    let canvas = document.createElement("canvas");
    canvas.width = 900;
    canvas.height = 200;

    let ctx = canvas.getContext("2d");

    ctx.strokeStyle = "cyan";
    ctx.lineWidth = 3;
    ctx.beginPath();

    let points = [
        temp-2, temp-1, temp-3,
        temp+1, temp+2, temp+1,
        temp-1, temp-2
    ];

    for(let i=0;i<points.length;i++){
        let x = i*120;
        let y = 200 - points[i]*4;

        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    }

    ctx.stroke();

    let div = document.getElementById("trend");
    div.innerHTML = "";
    div.appendChild(canvas);
}

/* CHATBOT */
function showTemp(){ alert(weatherData.temperature + "°C"); }
function showWeather(){ alert(weatherData.condition); }
function showHumidity(){ alert(weatherData.humidity + "%"); }

/* DEFAULT LOAD */
loadWeather("chennai");

</script>

</body>
</html>
